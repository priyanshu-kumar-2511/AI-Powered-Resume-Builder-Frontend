<div class="dashboard-wrapper">
  
  <div class="dashboard-header glass-panel">
    <div>
      <h1 class="welcome-text">Welcome to Resume AI</h1>
      <p class="subtitle">Your authentication was successful.</p>
    </div>
    
    <button class="logout-btn primary-btn" (click)="onLogout()">
      Logout
    </button>
  </div>

  <div class="dashboard-content">
    <div class="glass-panel stat-card">
      <h3>Active Resumes</h3>
      <div class="stat-value">0</div>
      <p>Create your first layout to start.</p>
    </div>

    <div class="glass-panel stat-card">
      <h3>Profile Completeness</h3>
      <div class="stat-value">25%</div>
      <p>Add your experiences to improve.</p>
    </div>

    <div class="glass-panel stat-card">
      <h3>AI Generations</h3>
      <div class="stat-value">0</div>
      <p>Let AI optimize your next skills set.</p>
    </div>
  </div>

</div>
