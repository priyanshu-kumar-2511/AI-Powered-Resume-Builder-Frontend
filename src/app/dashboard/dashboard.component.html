<div class="dashboard-wrapper">
  
  <!-- Navigation Header -->
  <header class="dashboard-header glass-panel">
    <div class="brand">
      <h1 class="logo-text">Resume<span>AI</span></h1>
      <p class="subtitle">🚀 Platform Dashboard</p>
    </div>
    
    <div class="header-actions">
      <button class="primary-btn pulse-glow" id="create-resume-btn" (click)="onCreateNew()">
        <span class="icon">+</span> New Resume
      </button>
      <button class="icon-btn admin-btn" id="admin-btn" title="System Administration" *ngIf="isAdmin" (click)="onAdmin()">
        🛡️
      </button>
      <button class="icon-btn settings-btn" id="settings-btn" title="Account Settings" (click)="onSettings()">
        ⚙️
      </button>
      <button class="logout-btn secondary-btn" id="logout-btn" (click)="onLogout()">
        Logout
      </button>
    </div>
  </header>

  <main class="dashboard-content">
    
    <!-- Loading State -->
    <div class="loading-overlay" *ngIf="isLoading">
      <div class="spinner"></div>
      <p>Fetching your professional profiles...</p>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar glass-panel" *ngIf="!isLoading">
      <div class="stat-item">
        <span class="stat-number">{{ resumes.length }}</span>
        <span class="stat-label">Total Resumes</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number">{{ publishedCount }}</span>
        <span class="stat-label">Published</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-number free-tag">FREE</span>
        <span class="stat-label">Subscription Plan</span>
      </div>
    </div>

    <!-- Resumes Grid (HIDDEN FOR RE-IMPLEMENTATION) -->
    <!-- <div class="resume-grid" *ngIf="!isLoading && resumes.length > 0">
         ... Code Removed ...
    </div> -->

    <!-- Empty State -->
    <div class="empty-state glass-panel" *ngIf="!isLoading && resumes.length === 0">
      <div class="empty-icon">📂</div>
      <h2>No Resumes Found</h2>
      <p>You haven't created any resumes yet. Start your career journey with AI optimization.</p>
      <button class="primary-btn" (click)="onCreateNew()">Create My First Resume</button>
    </div>
  </main>

</div>
