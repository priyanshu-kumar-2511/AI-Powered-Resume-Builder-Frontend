<div class="list-editor">
  <div class="save-status" *ngIf="saving">Saving...</div>
  <div class="alert alert-error" *ngIf="saveError">{{ saveError }}</div>

  <div class="list-entries" *ngIf="entries.length > 0">
    <div class="entry-card" *ngFor="let entry of entries; let i = index" [formGroup]="entry">
      <div class="entry-header">
        <h4>Certification {{ i + 1 }}</h4>
        <button type="button" class="btn-icon text-error" (click)="removeEntry(i)" title="Remove certification">✕</button>
      </div>

      <div class="form-row">
        <div class="form-group flex-2">
          <label>Certification Name *</label>
          <input type="text" formControlName="name" placeholder="e.g. AWS Certified Solutions Architect" class="form-control">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label>Date Issued / Expiration</label>
          <input type="text" formControlName="date" placeholder="e.g. 2023 or Jan 2023 – Present" class="form-control">
        </div>
      </div>
    </div>
  </div>

  <button type="button" class="btn-add-lg" (click)="addEntry()">
    + Add Certification
  </button>
</div>

<style>
.list-editor { display: flex; flex-direction: column; gap: 20px; position: relative; }
.save-status { position: absolute; top: -30px; right: 0; font-size: 0.8rem; color: var(--teal); font-weight: 600; }
.list-entries { display: flex; flex-direction: column; gap: 24px; }

.entry-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}

.entry-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.entry-header h4 { margin: 0; font-size: 0.95rem; color: rgba(255,255,255,0.8); }

.form-row { display: flex; gap: 16px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.flex-1 { flex: 1; }
.flex-2 { flex: 2; }

label { font-size: 0.8rem; color: rgba(255,255,255,0.6); font-weight: 500; }

.btn-icon { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 4px; border-radius: 4px; }
.btn-icon:hover { background: rgba(255,255,255,0.1); color: #fff; }
.text-error { color: #ef4444; }
.text-error:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

.btn-add-lg {
  background: rgba(0,212,180,0.1); border: 1px dashed rgba(0,212,180,0.4); color: var(--teal);
  padding: 16px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem;
}
.btn-add-lg:hover { background: rgba(0,212,180,0.15); border-style: solid; }
</style>
