<div class="add-section-panel">
  <div class="panel-header">
    <h2>Add Section</h2>
    <button type="button" class="close-btn" (click)="cancel()">✕</button>
  </div>

  @if (error) {
    <div class="alert alert-error">{{ error }}</div>
  }

  <p class="panel-hint">Choose a section type to add to your resume.</p>

  <div class="type-grid">
    @for (option of sectionOptions; track option.type) {
      <button
        type="button"
        class="type-tile"
        [class.selected]="selectedType === option.type"
        (click)="selectType(option)">
        <span class="tile-icon">{{ option.icon }}</span>
        <span class="tile-label">{{ option.label }}</span>
      </button>
    }
  </div>

  @if (selectedType) {
    <div class="title-row" [formGroup]="form">
      <label class="field-label" for="sectionTitle">Section Title</label>
      <input
        id="sectionTitle"
        type="text"
        class="field-input"
        formControlName="title"
        placeholder="e.g. Work Experience"
        [class.invalid]="form.controls.title.invalid && form.controls.title.touched" />
      @if (form.controls.title.invalid && form.controls.title.touched) {
        <span class="field-error">Title is required (max 80 chars).</span>
      }
    </div>
  }

  <div class="panel-actions">
    <button type="button" class="btn btn-ghost" (click)="cancel()">Cancel</button>
    <button
      type="button"
      class="btn btn-primary"
      [disabled]="adding || !selectedType"
      (click)="add()">
      {{ adding ? 'Adding...' : 'Add Section' }}
    </button>
  </div>
</div>

<style>
.add-section-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 640px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;

  h2 { font-size: 1.3rem; margin: 0; }
}

.close-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 1rem;
  padding: 4px 8px;
}

.panel-hint {
  color: var(--text-secondary);
  font-size: 0.88rem;
  margin: 0;
}

.type-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}

.type-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}

.type-tile:hover {
  border-color: var(--teal);
  background: rgba(0,212,180,0.06);
}

.type-tile.selected {
  border-color: var(--teal);
  background: rgba(0,212,180,0.12);
}

.tile-icon  { font-size: 1.5rem; }
.tile-label { font-size: 0.8rem; font-weight: 500; color: var(--text-primary); }

.title-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field-label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.field-input {
  width: 100%;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-primary);
  font-size: 0.92rem;
  box-sizing: border-box;
}

.field-input.invalid { border-color: #ef4444; }
.field-error { font-size: 0.78rem; color: #ef4444; }

.panel-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
</style>
