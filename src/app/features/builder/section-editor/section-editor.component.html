<div class="section-editor-wrap">
  <div class="editor-header">
    <div class="editor-header-left">
      <span class="editor-type-badge">{{ section.sectionType }}</span>
      <h2 class="editor-title">{{ section.title }}</h2>
    </div>
    @if (!showConfirmDelete) {
      <button
        type="button"
        class="delete-btn"
        [disabled]="deleting"
        (click)="deleteSection()"
        title="Delete section">
        🗑️ Delete
      </button>
    } @else {
      <div class="confirm-delete-wrap">
        <span class="confirm-label">Are you sure?</span>
        <button type="button" class="btn-confirm-yes" (click)="deleteSection()" [disabled]="deleting">
          {{ deleting ? '...' : 'Yes, Delete' }}
        </button>
        <button type="button" class="btn-confirm-no" (click)="cancelDelete()" [disabled]="deleting">
          Cancel
        </button>
      </div>
    }
  </div>

  @if (deleteError) {
    <div class="alert alert-error">{{ deleteError }}</div>
  }

  <div class="editor-body">
    @switch (section.sectionType) {
      @case ('SUMMARY') {
        <app-summary-editor [section]="section" (saved)="onUpdated($event)" />
      }
      @case ('EXPERIENCE') {
        <app-experience-editor [section]="section" (saved)="onUpdated($event)" />
      }
      @case ('EDUCATION') {
        <app-education-editor [section]="section" (saved)="onUpdated($event)" />
      }
      @case ('SKILLS') {
        <app-skills-editor [section]="section" (saved)="onUpdated($event)" />
      }
      @default {
        <app-generic-section-editor [section]="section" (saved)="onUpdated($event)" />
      }
    }
  </div>
</div>

<style>
.section-editor-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.editor-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.editor-type-badge {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--teal);
  background: rgba(0,212,180,0.1);
  border: 1px solid rgba(0,212,180,0.2);
  padding: 3px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}

.editor-title {
  font-size: 1.1rem;
  margin: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.delete-btn {
  background: none;
  border: 1px solid rgba(239,68,68,0.3);
  color: #ef4444;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s;
}

.delete-btn:hover { background: rgba(239,68,68,0.1); }
.delete-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.confirm-delete-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(239, 68, 68, 0.08);
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid rgba(239, 68, 68, 0.2);
  animation: slideIn 0.2s ease-out;
}

@keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

.confirm-label { font-size: 0.72rem; font-weight: 600; color: #f87171; margin-right: 4px; }

.btn-confirm-yes {
  background: #ef4444; color: #fff; border: none; padding: 4px 10px;
  border-radius: 6px; font-size: 0.72rem; font-weight: 700; cursor: pointer;
}
.btn-confirm-yes:hover { background: #dc2626; }

.btn-confirm-no {
  background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer;
}
.btn-confirm-no:hover { background: rgba(255,255,255,0.1); }

.editor-body { padding: 24px; }
</style>
