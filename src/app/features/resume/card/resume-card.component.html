<article class="resume-card" [class.public-card]="showPublicMeta">
  <button
    type="button"
    class="resume-preview"
    [class.clickable]="showPublicMeta"
    (click)="handleOpen()">
    @if (template?.thumbnailUrl) {
      <img [src]="template?.thumbnailUrl" [alt]="template?.name || resume.title" loading="lazy">
    } @else {
      <div class="preview-placeholder">
        <div class="placeholder-grid"></div>
        <div class="placeholder-lines">
          <div class="ph-line ph-title"></div>
          <div class="ph-line ph-sub"></div>
          <div class="ph-line ph-short"></div>
          <div class="ph-divider"></div>
          <div class="ph-line ph-med"></div>
          <div class="ph-line ph-long"></div>
          <div class="ph-line ph-med"></div>
        </div>
        <span class="placeholder-initial">{{ resume.title.charAt(0) || 'R' }}</span>
      </div>
    }

    <div class="preview-top-bar">
      <span class="visibility-pill" [class]="resume.isPublic ? 'pill-public' : 'pill-private'">
        <span class="pill-dot"></span>
        {{ resume.isPublic ? 'Public' : 'Private' }}
      </span>
      @if (showPublicMeta) {
        <span class="view-pill">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          {{ resume.viewCount | number }} views
        </span>
      }
    </div>
  </button>

  <div class="resume-body">
    <div class="resume-head">
      <div class="resume-titles">
        <h3 class="resume-title">{{ resume.title }}</h3>
        <p class="resume-role">{{ resume.targetJobTitle || 'No target role set' }}</p>
      </div>

      <div class="ats-ring">
        <svg class="ats-svg" viewBox="0 0 44 44" width="64" height="64">
          <circle class="ats-track" cx="22" cy="22" r="18" fill="none" stroke-width="4"/>
          <circle class="ats-fill" cx="22" cy="22" r="18" fill="none" stroke-width="4"
            [style.strokeDasharray]="atsCircumference"
            [style.strokeDashoffset]="atsOffset"
            [style.stroke]="atsColor"/>
        </svg>
        <div class="ats-center">
          <strong>{{ atsScore }}</strong>
          <span>ATS</span>
        </div>
      </div>
    </div>

    <div class="resume-meta-row">
      <span class="status-pill" [class]="statusClass">{{ resume.status }}</span>
      <span class="meta-dot">·</span>
      <span class="meta-txt">{{ lastUpdatedLabel }}</span>
      @if (template?.name) {
        <span class="meta-dot">·</span>
        <span class="meta-txt template-tag">{{ template?.name }}</span>
      }
    </div>

    @if (showPublicMeta) {
      <div class="public-footer">
        <span class="public-copy">Tap to inspect the resume details.</span>
        <button type="button" class="action-btn action-primary" (click)="viewDetails.emit(resume)">View Resume</button>
      </div>
    } @else {
      <div class="resume-actions">
        <button type="button" class="action-btn action-primary" [disabled]="disableActions" (click)="edit.emit(resume)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit
        </button>
        <button type="button" class="action-btn action-ghost" [disabled]="disableActions" (click)="duplicate.emit(resume)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Duplicate
        </button>
        <button
          type="button"
          class="action-btn"
          [class]="resume.status === 'COMPLETE' ? 'action-ghost' : 'action-complete'"
          [disabled]="disableActions"
          (click)="toggleStatus.emit(resume)">
          @if (resume.status === 'COMPLETE') {
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Make Draft
          } @else {
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Complete
          }
        </button>
        <button
          type="button"
          class="action-btn"
          [class]="resume.isPublic ? 'action-ghost' : 'action-publish'"
          [disabled]="disableActions"
          (click)="resume.isPublic ? unpublish.emit(resume) : publish.emit(resume)">
          {{ resume.isPublic ? 'Unpublish' : 'Publish' }}
        </button>
        <button type="button" class="action-btn action-danger" [disabled]="disableActions" (click)="delete.emit(resume)">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </div>
    }
  </div>
</article>

<style>
.resume-card {
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.resume-card:hover {
  border-color: rgba(0,212,180,0.3);
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.35), 0 0 0 1px rgba(0,212,180,0.08);
}

/* Preview area */
.resume-preview {
  position: relative;
  height: 230px;
  border: none; padding: 0;
  background: linear-gradient(145deg, #0d1117, #161b27);
  cursor: default; overflow: hidden; width: 100%;
  display: block;
}
.resume-preview.clickable { cursor: pointer; }
.resume-preview img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s ease;
}
.resume-card:hover .resume-preview img { transform: scale(1.04); }

/* Placeholder mock resume */
.preview-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(155deg, #0c1220 0%, #131c2f 100%);
  position: relative; overflow: hidden;
}
.placeholder-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(0,212,180,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,180,0.03) 1px, transparent 1px);
  background-size: 20px 20px;
}
.placeholder-lines {
  position: absolute; left: 24px; right: 24px; top: 24px;
  display: flex; flex-direction: column; gap: 6px;
}
.ph-line {
  height: 6px; border-radius: 3px;
  background: rgba(255,255,255,0.07);
}
.ph-title { width: 60%; height: 10px; background: rgba(0,212,180,0.15); }
.ph-sub { width: 40%; background: rgba(255,255,255,0.05); }
.ph-short { width: 30%; }
.ph-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 4px 0; }
.ph-med { width: 75%; }
.ph-long { width: 90%; }
.placeholder-initial {
  font-size: 3.5rem; font-weight: 800;
  color: rgba(0,212,180,0.12);
  font-family: var(--font-display);
  position: absolute; right: 20px; bottom: 10px;
  line-height: 1;
}

/* Top overlay bar */
.preview-top-bar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
}
.visibility-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 999px;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
  backdrop-filter: blur(8px);
}
.pill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.pill-public { background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); }
.pill-public .pill-dot { background: var(--gold); }
.pill-private { background: rgba(0,212,180,0.12); border: 1px solid rgba(0,212,180,0.3); color: var(--teal); }
.pill-private .pill-dot { background: var(--teal); }
.view-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 999px;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary); font-size: 0.7rem;
  backdrop-filter: blur(8px);
}

/* Body */
.resume-body { display: flex; flex-direction: column; gap: 14px; padding: 20px; }

.resume-head {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 12px;
}
.resume-titles { flex: 1; min-width: 0; }
.resume-title {
  font-size: 1.1rem; font-weight: 700;
  color: var(--text-primary); margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.resume-role { font-size: 0.83rem; color: var(--text-secondary); }

/* ATS ring */
.ats-ring { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
.ats-svg { transform: rotate(-90deg); }
.ats-track { stroke: rgba(255,255,255,0.06); }
.ats-fill { stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
.ats-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.ats-center strong { font-size: 0.95rem; font-weight: 800; line-height: 1; }
.ats-center span { font-size: 0.55rem; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 1px; }

/* Meta row */
.resume-meta-row {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; font-size: 0.77rem; color: var(--text-muted);
}
.meta-dot { opacity: 0.3; }
.meta-txt { color: var(--text-muted); }
.template-tag { color: var(--text-secondary); font-style: italic; }

.status-pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 999px;
  font-size: 0.67rem; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
}
.status-complete { background: rgba(201,168,76,0.1); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); }
.status-draft { background: var(--teal-subtle); color: var(--teal); border: 1px solid var(--border-teal); }

/* Actions */
.resume-actions {
  display: flex; align-items: center; gap: 6px;
  flex-wrap: wrap; padding-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.04);
}
.public-footer {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.04);
}
.public-copy { color: var(--text-secondary); font-size: 0.8rem; flex: 1; }

.action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 9px; border: none;
  font-size: 0.8rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.action-primary {
  background: linear-gradient(135deg, rgba(0,212,180,0.15), rgba(0,212,180,0.08));
  border: 1px solid rgba(0,212,180,0.25);
  color: var(--teal);
}
.action-primary:hover:not(:disabled) { background: rgba(0,212,180,0.2); border-color: rgba(0,212,180,0.4); }

.action-ghost {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary);
}
.action-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.08); color: var(--text-primary); }

.action-publish {
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  color: var(--gold);
}
.action-publish:hover:not(:disabled) { background: rgba(201,168,76,0.15); }

.action-complete {
  background: rgba(16, 185, 129, 0.08);
  border: 1px solid rgba(16, 185, 129, 0.2);
  color: #10b981;
}
.action-complete:hover:not(:disabled) { background: rgba(16, 185, 129, 0.15); }

.action-danger {
  background: rgba(252,165,165,0.06);
  border: 1px solid rgba(252,165,165,0.15);
  color: #fca5a5;
  margin-left: auto;
}
.action-danger:hover:not(:disabled) { background: rgba(252,165,165,0.12); border-color: rgba(252,165,165,0.3); }
</style>
