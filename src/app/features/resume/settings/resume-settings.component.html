<aside class="settings-card">
  <div class="settings-header">
    <div>
      <span class="badge badge-teal">Builder Settings</span>
      <h2>Resume metadata</h2>
      <p>Updates save automatically as you type.</p>
    </div>
    <div class="settings-actions">
      <button type="button" class="export-trigger" [disabled]="loading" (click)="isExportOpen = true">
        Export Resume
      </button>
      <div class="save-indicator" [class.error]="saveState === 'error'">
        {{ saveLabel }}
      </div>
    </div>
  </div>

  @if (loading) {
    <div class="settings-loading">
      <div class="spinner spinner-light"></div>
      <span>Loading resume settings...</span>
    </div>
  } @else {
    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form [formGroup]="form" class="settings-form">
      <div class="form-group">
        <label class="form-label" for="resume-title">Resume Title</label>
        <input id="resume-title" type="text" class="form-control" formControlName="title" placeholder="e.g. Senior Frontend Engineer">
      </div>

      <div class="form-group">
        <label class="form-label" for="resume-job-title">Target Job Title</label>
        <input id="resume-job-title" type="text" class="form-control" formControlName="targetJobTitle" placeholder="e.g. Angular Developer">
      </div>

      <div class="settings-grid">
        <div class="form-group">
          <label class="form-label" for="resume-language">Language</label>
          <select id="resume-language" class="form-control" formControlName="language">
            @for (language of languages; track language.value) {
              <option [value]="language.value">{{ language.label }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="resume-status">Status</label>
          <select id="resume-status" class="form-control" formControlName="status">
            <option value="DRAFT">Draft</option>
            <option value="COMPLETE">Complete</option>
          </select>
        </div>
      </div>
    </form>
  }
</aside>

@if (isExportOpen) {
  <app-export-modal [resumeId]="resumeId" (close)="isExportOpen = false" />
}

<style>
.settings-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.settings-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.settings-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.settings-header h2 {
  font-size: 1.45rem;
  margin: 10px 0 6px;
}

.settings-header p {
  color: var(--text-secondary);
  font-size: 0.88rem;
}

.save-indicator {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(0, 212, 180, 0.08);
  border: 1px solid rgba(0, 212, 180, 0.2);
  color: var(--teal);
  font-size: 0.76rem;
  white-space: nowrap;
}

.export-trigger {
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  background: linear-gradient(135deg, #00d4b4, #00b89c);
  color: #04120f;
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
}

.export-trigger:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(0, 212, 180, 0.25);
}

.export-trigger:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  box-shadow: none;
}

.save-indicator.error {
  background: rgba(224, 82, 82, 0.12);
  border-color: rgba(224, 82, 82, 0.2);
  color: #f87171;
}

.settings-loading {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-secondary);
}

.settings-form {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.settings-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

@media (max-width: 640px) {
  .settings-grid { grid-template-columns: 1fr; }
}
</style>
